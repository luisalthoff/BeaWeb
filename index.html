<!doctype html>
<html>
  <head>
    <!-- BeaWeb-6-6-26.html -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Bea Web</title>
    
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js" defer></script>
    <script src="js/app.js" defer></script>


  </head>

  <body>

      <!--========== TELA AGENDA ===========-->

    <div class="vidro">
      <div id="agendaScreen">
        <div class="cabeca2">
          <button id="btnWalkIn" class="botao">🪂</button>
          <button onclick="clearDatabase()"; style="transform: scale(0.6, 0.8);">🗑️3</button>
          <div id="title"></div>
          <button id="btnToggle" class="botao" style="color: var(--corBtn)">⇪</button>
        </div>
        <div id="calendarPanel">
          <div class="cabeca">
            <button id="prevMonth" style="font-size: var(--fntTit); color: var(--corBtn)">◀</button>
            <div id="monthLabel">07/Jun</div>
            <button id="nextMonth" style="font-size: var(--fntTit); color: var(--corBtn)">▶</button>
          </div>

          <div id="weekdays" style="padding-top: 20px; padding-bottom: 20px">
            <div>D</div>
            <div>S</div>
            <div>T</div>
            <div>Q</div>
            <div>Q</div>
            <div>S</div>
            <div>S</div>
          </div>
          <div id="calendarGrid"></div>
        </div>
        <div id="agendaPanel"></div>

				<!----------- AULA AVULSA (TELA MODAL) --------------->
        <div id="sessionModal" class="modal hidden">
          <div class="sheet">
            <h2>Aula Avulsa</h2>
            <input
              id="sessionName"
              list="clientList"
              placeholder="Select or type name"
            />

            <datalist id="clientList"></datalist>
            <select id="sessionTime"></select>
            <label>Cost</label>

            <input id="sessionCost" type="number" step="0.01" value="0" />

            <div class="buttons">
              <button id="btnCancelSession">Cancel</button>

              <button id="btnSaveSession">Save</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!----------- MENU BOTTOM --------------->
		<div class="vidroMenuBot">
			<div id="menuBottom" class="cabeca">
				<button id="btnAgendaTab">📅</button>
				<button id="btnClientsTab">🏋️‍♂️</button>
				<button id="btnBillingTab">📓</button>
        <button id="appSettings">⚙️</button>
			</div>
		</div>

    <!--========== TELA ALUNOS ===========-->
    <div id="clientsScreen" class="hidden">
      <header class="hdrClient">
        <div>Clientes</div>
        <button id="btnAddClient">ᐩ🧘‍♀️</button>
      </header>
      <div id="clientsList"></div>
    </div>

    <div id="billingScreen" class="hidden">
      <header>
        <button>&nbsp;</button>
        <div>Fechamento</div>
        <button>&nbsp;</button>
      </header>

    <!--========== TELA FECHAMENTO ===========-->
      <div id="billingControls">
        <select id="billingMonth"></select>
        <select id="billingYear"></select>
      </div>

      <div id="billingList"></div>
    </div>

    <!--========== MODAL ALUNOS ===========-->
    <div id="clientModal" class="modal hidden">
      <div class="modalContent">
        <h2 id="clientModalTitle">Dados</h2>
        <input id="clientName" placeholder="Name" />
        <input id="clientPhone" placeholder="Phone" />
        <input id="clientPrice" type="number" placeholder="Session Value" />
        <h3>Schedule</h3>

        <div class="scheduleInputRow">
          <select id="scheduleWeekday">
            <option value="1">Seg</option>
            <option value="2">Ter</option>
            <option value="3">Qua</option>
            <option value="4">Qui</option>
            <option value="5">Sex</option>
            <option value="6">Sab</option>
            <option value="0">Dom</option>
          </select>

          <input id="scheduleTime" type="time" value="07:00" />

          <button type="button" id="btnAddSchedule">+ Add Schedule</button>
        </div>

        <div id="scheduleList"></div>
        
        <div class="buttons">
          <button id="btnCancelClient">Cancel</button>
          <button id="btnSaveClient">Save</button>
        </div>
      </div>
    </div>

    <!--========== MODAL PAGAMENTOS ===========-->
    <div id="paymentModal" class="modal hidden">
      <div class="modalContent">
        <h2 id="paymentClientName"></h2>
        <select id="paymentYear"></select>
        <div id="paymentMonths"></div>
        <div class="buttons">
          <button id="btnCancelPayment">Cancel</button>
          <button id="btnSavePayment">Save</button>
        </div>
      </div>
    </div>

    <!--========== APP SETTINGS ===========-->
    <div id="settingsScreen" class="hidden">
      <h2>Settings</h2>
    </div>

    <!--========== JAVASCRIPT ===========-->

  </body>
</html>
