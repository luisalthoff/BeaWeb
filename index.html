<!doctype html>
<html>
  <head>
    <!-- BeaWeb-6-6-26.html -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>

    <title>Bea Web</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/config.js" defer></script>
    <script src="js/app.js" defer></script>
  </head>

  <body>

  <div id="main">
    <!----------- MENU BOTTOM --------------->
    <nav class="floating-menu">
      <button onclick="clearDatabase();">DB</button>
      <button id="btnTab1" class="menu-btn active">
        <img src="img/calendario.svg" alt="" />
      </button>
      <button id="btnTab2" class="menu-btn">
        <img src="img/clientes.svg" alt="" />
      </button>
      <button id="btnTab3" class="menu-btn">
        <img src="img/fechamento.svg" alt="" />
      </button>
      <button id="btnTab4" class="menu-btn">
        <img src="img/ajustes.svg" alt="" />
      </button>
    </nav>

    <!----------- MENU TOP --------------->
    <div class="floating-menu-top">
      <button id="btnWalkIn" class="menu-btn-top">W1
        <img src="img/avulso.svg" alt="Aula Avulsa">
      </button>
      <div id="title"></div>
      <button id="btnToggle" class="menu-btn-top">
        <img src="img/ag+.svg"  alt="Expande">
      </button>
    </div>
    
      <!--======= TAB 1 (Calendario e Agenda) ===========-->
      <div id="tab1"> 
        <div id="calendarPanel">
        
          <!--    <  MES/ANO  >      --> 
          <div class="cabeca">
            <button id="prevMonth" style="font-size: var(--fntTit); color: var(--corBtn)">◀</button>
            <div id="monthLabel" style="font-size: var(--fntTit); color: var(--corFnt)"></div>
            <button id="nextMonth" style="font-size: var(--fntTit); color: var(--corBtn)">▶</button>
          </div>

          <!--    Dom Seg Ter Qua Qui Sex Sab      -->  
          <div id="weekdays" style="padding-top: 20px; padding-bottom: 20px">
            <div>D</div>
            <div>S</div>
            <div>T</div>
            <div>Q</div>
            <div>Q</div>
            <div>S</div>
            <div>S</div>
          </div>

          <!--    Grid com dias      -->  
          <div id="calendarGrid"></div>
        </div>

        <!-- ======== AGENDA ========= -->
        <div id="agendaPanel"></div>
      </div>
    
      <!--======= TAB 2 (Clients) ===========-->
      <div id="tab2" class="hidden">
        <header class="hdrClient">
          <div>Clientes</div>
          <button id="btnAddClient">ᐩ🧘‍♀️</button>
        </header>
        <div id="clientsList"></div>
      </div>

      <!--====== TAB 3 (Fechamento) =========-->
      <div id="tab3" class="hidden">
        <header>
          <button>&nbsp;</button>
          <div>Fechamento</div>
          <button>&nbsp;</button>
        </header>
        <div id="billingControls">
          <select id="billingMonth"></select>
          <select id="billingYear"></select>
        </div>
        <div id="billingList"></div>
      </div>

      <!--====== TAB 4 (App Settings) =========-->
      <div id="tab4" class="hidden">
        <div id="ajustes"></div>
      </div>
    </div>   
</div>

<dialog id="myModal" class="modal-box">
  <p>This is a centered modal!</p>
  <button onclick="this.closest('dialog').close()"></button>
</dialog>



    <!----------- AULA AVULSA (MODAL) --------------->
    <dialog id="sessionModal" class="modal hidden">
      <div class="sheet">
        <h2>Aula Avulsa</h2>
        <input
          id="sessionName"
          list="clientList"
          placeholder="Select or type name"
        />

        <datalist id="clientList"></datalist>
        <select id="sessionTime"></select>
        <label>Cost</label>

        <input id="sessionCost" type="number" step="0.01" value="0" />

        <div class="buttons">
          <button id="btnCancelSession">Cancel</button>
          <button id="btnSaveSession">Save</button>
        </div>
      </div>
    </dialog>
    <!--========== MODAL ALUNOS ===========-->
    <div id="clientModal" class="modal hidden">
      <div class="modalContent">
        <h2 id="clientModalTitle">Dados</h2>
        <input id="clientName" placeholder="Name" />
        <input id="clientPhone" placeholder="Phone" />
        <input id="clientPrice" type="number" placeholder="Session Value" />
        <h3>Schedule</h3>

        <div class="scheduleInputRow">
          <select id="scheduleWeekday">
            <option value="1">Seg</option>
            <option value="2">Ter</option>
            <option value="3">Qua</option>
            <option value="4">Qui</option>
            <option value="5">Sex</option>
            <option value="6">Sab</option>
            <option value="0">Dom</option>
          </select>

          <input id="scheduleTime" type="time" value="07:00" />

          <button type="button" id="btnAddSchedule">+ Add Schedule</button>
        </div>

        <div id="scheduleList"></div>

        <div class="buttons">
          <button id="btnCancelClient">Cancel</button>
          <button id="btnSaveClient">Save</button>
        </div>
      </div>
    </div>

    <!--========== MODAL PAGAMENTOS ===========-->
    <div id="paymentModal" class="modal hidden">
      <div class="modalContent">
        <h2 id="paymentClientName"></h2>
        <select id="paymentYear"></select>
        <div id="paymentMonths"></div>
        <div class="buttons">
          <button id="btnCancelPayment">Cancel</button>
          <button id="btnSavePayment">Save</button>
        </div>
      </div>
    </div>

  </body>
</html>
